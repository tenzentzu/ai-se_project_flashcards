<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Miles English" />
    <meta
      name="keywords"
      content="study aids, coding study, bootcamp, flashcards"
    />
    <meta
      name="description"
      content="A website that helps individuals learn coding terminology through the use of flashcards."
    />

    <title>Sprint 1 Project</title>

    <link rel="icon" sizes="100x100" href="favicon.ico" />
    <link rel="stylesheet" href="./assets/css/index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#not-found">About</a></li>
          <!-- Carousel removed from nav; accessible via Practice button in deck view -->
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <div class="wrapping-row">
          <ul class="gallery__list wrapping-row__display-contents"></ul>
          <button type="button" class="card gallery__new-deck-btn">
            + New Deck
          </button>
        </div>
      </section>

      <section
        id="carousel"
        class="carousel page__main-content_location_carousel"
      >
        <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
        <div class="carousel__row">
          <button
            disabled
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            type="button"
            aria-label="go to previous card"
          ></button>
          <div class="carousel__card">
            <p class="carousel__card-text"></p>
            <!--
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          --></div>
          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="go to next card"
          ></button>
        </div>
        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="flip card to other side"
        ></button>
      </section>

      <section id="deck-view" class="deck-view">
        <div class="deck-view__header">
          <h2 class="deck-view__title"></h2>
          <button
            class="card deck-view__practice-btn"
            type="button"
            aria-label="Practice this deck"
          >
            Practice
          </button>
        </div>
        <div class="wrapping-row">
          <ul class="card deck-view__cards wrapping-row__display-contents"></ul>
        </div>
      </section>

      <!--Forgot what this section is for. Dont have an about page. Is it supposed to lead to this instead? 
      Dont think this is supposed to be visible at all times. IDK. Figure out later.-->
      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
    </main>

    <template id="deck">
      <li class="card card_color_green">
        <a class="card__link" href="#"></a>
        <h3 class="card__title"></h3>
        <div class="card__row">
          <p class="card__count">10 Cards</p>
          <button
            class="card__delete-btn"
            aria-label="Delete this deck"
            type="button"
          ></button>
        </div>
      </li>
    </template>

    <template id="card-template">
      <li class="deck-view__item">
        <div class="deck-view__card">
          <p class="deck-view__card-text"></p>
          <button
            class="deck-view__flip-btn carousel__btn carousel__btn_type_flip"
            type="button"
            aria-label="flip card to other side"
          ></button>
          <button
            class="deck-view__delete-btn card__delete-btn"
            type="button"
            aria-label="delete this card"
          ></button>
        </div>
      </li>
    </template>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Miles English</p>
    </footer>
    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
