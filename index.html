<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Miles English" />
    <meta
      name="keywords"
      content="study aids, coding study, bootcamp, flashcards"
    />
    <meta
      name="description"
      content="A website that helps individuals learn coding terminology through the use of flashcards."
    />

    <title>Sprint 1 Project</title>

    <link rel="icon" sizes="100x100" href="favicon.ico" />
    <link rel="stylesheet" href="./assets/vendor/normalize.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#not-found">About</a></li>
          <li>
            <a class="nav__link" href="#carousel">Carousel</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <section id="home" class="decks">
        <h2 class="decks__title">My Decks</h2>
        <div class="wrapping-row">
          <ul class="decks__list wrapping-row__display-contents"></ul>
          <button type="button" class="deck decks__new-deck-btn">
            + New Deck
          </button>
        </div>
      </section>

      <section
        id="carousel"
        class="carousel page__main-content_location_carousel"
      >
        <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
        <div class="carousel__row">
          <button
            disabled
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            type="button"
            aria-label="go to previous card"
          ></button>
          <div class="carousel__card">
            <p class="carousel__card-text"></p>
            <!--
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          --></div>
          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="go to next card"
          ></button>
        </div>
        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="flip card to other side"
        ></button>
      </section>

      <!--Forgot what this section is for. Dont have an about page. Is it supposed to lead to this instead? 
      Dont think this is supposed to be visible at all times. IDK. Figure out later.-->
      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
    </main>

    <template id="deck">
      <li class="deck deck_color_green">
        <a class="deck__link" href="#"></a>
        <h3 class="deck__title"></h3>
        <div class="deck__row">
          <p class="deck__count"></p>
          <button
            class="deck__delete-btn"
            aria-label="Delete this deck"
            type="button"
          ></button>
        </div>
      </li>
    </template>

    <footer class="footer">
      <p class="footer__text">&copy; 2026 Miles English</p>
    </footer>
    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
